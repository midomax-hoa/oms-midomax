services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_SHOPEE_API_URL=${VITE_SHOPEE_API_URL}
    expose:
      - "80"
    networks:
      - dokploy-network
      - default
    depends_on:
      - api
      - mock-api

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api.prod
    expose:
      - "3002"
    environment:
      - NODE_ENV=production
      - SHOPEE_PARTNER_ID=${SHOPEE_PARTNER_ID}
      - SHOPEE_PARTNER_KEY=${SHOPEE_PARTNER_KEY}
      - SHOPEE_API_HOST=${SHOPEE_API_HOST}
      - SHOPEE_REDIRECT_URL=${SHOPEE_REDIRECT_URL}
      - SHOPEE_FRONTEND_URL=${SHOPEE_FRONTEND_URL}
      - API_PORT=${API_PORT:-3002}
    networks:
      - dokploy-network
      - default
    depends_on:
      - mock-api

  mock-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    command: ["pnpm", "--filter", "@workspace/mock-api", "start"]
    expose:
      - "3001"
    networks:
      - default

networks:
  dokploy-network:
    external: true
