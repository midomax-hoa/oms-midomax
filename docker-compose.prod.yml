services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    expose:
      - "80"
    networks:
      - dokploy-network
      - default
    depends_on:
      - mock-api

  mock-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    command: ["pnpm", "--filter", "@workspace/mock-api", "start"]
    expose:
      - "3001"
    networks:
      - default

networks:
  dokploy-network:
    external: true
