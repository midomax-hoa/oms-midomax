services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    ports:
      - "80:80"
    depends_on:
      - mock-api

  mock-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    command: ["pnpm", "--filter", "@workspace/mock-api", "start"]
    ports:
      - "3001:3001"
